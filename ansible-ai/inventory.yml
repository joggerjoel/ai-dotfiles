# Inventory for the aorus *-claude hosts.
# ProxyJump is baked in here so this works regardless of ~/.ssh/config state.
aorus_ai:
  hosts:
    aorus: { ansible_host: 192.0.2.0 }
    aorus4: { ansible_host: 192.0.2.0 }
    aorus5: { ansible_host: 192.0.2.0 }
    aorus6: { ansible_host: 192.0.2.0 }
    aorus7: { ansible_host: 192.0.2.0 }
    aorus8: { ansible_host: 192.0.2.0 }
    macstudio: { ansible_host: 192.0.2.0 }
  vars:
    ansible_user: joggerjoel
    ansible_ssh_common_args: >-
      -o ProxyJump=203.0.113.1
      -o ConnectTimeout=15
      -o StrictHostKeyChecking=accept-new
    # Consumed by the playbook:
    claude_bin: "{{ ansible_env.HOME }}/.local/bin/claude"
    projects_dir: "{{ ansible_env.HOME }}/Documents/Projects"
    # ai-dotfiles (config layer) — vps profile, unattended:
    install_dotfiles: true
    dotfiles_repo: "https://github.com/joggerjoel/ai-dotfiles.git"
    dotfiles_dir: "{{ ansible_env.HOME }}/ai-dotfiles"
    dotfiles_github_user: "joggerjoel"
    dotfiles_hide_ai: "y" # matches the no-AI-attribution commit policy

# ── Local control node (this Mac) ────────────────────────────────
# `ansible_connection: local` runs tasks here directly — no SSH, no ProxyJump —
# so it's immune to the changing hostname/IP as you move between networks.
# Sibling groups don't share vars, so the two paths update.yml needs are set
# here: the repo lives at a different path locally than on the fleet, and there
# is no ProxyJump. update.yml then does the same claude/sibling-CLI upgrade +
# `setup.sh update` (plugins/skills) it does on the servers — i.e. exactly what
# `./setup.sh update` does by hand, just folded into the fleet run.
# Kept OUT of provision-ai.yml on purpose — the control node is never provisioned.
local_ai:
  hosts:
    localhost:
      ansible_connection: local
  vars:
    claude_bin: "{{ ansible_env.HOME }}/.local/bin/claude"
    dotfiles_dir: "{{ ansible_env.HOME }}/Developer/Git/ai-dotfiles"

# ── The everyday update target: fleet + this control node ────────
# `ansible-playbook update.yml` (hosts: ai_all) refreshes the aorus servers AND
# this Mac in one shot. Limit either side when needed:
#   --limit aorus_ai   (servers only)   --limit local_ai   (this Mac only)
ai_all:
  children:
    aorus_ai:
    local_ai:
